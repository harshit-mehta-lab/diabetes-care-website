apiVersion: apps/v1
kind: Deployment
metadata:
  name: diabetes-care-app
  labels:
    app: diabetes-care
spec:
  replicas: 2
  selector:
    matchLabels:
      app: diabetes-care
  template:
    metadata:
      labels:
        app: diabetes-care
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: diabetes-care-app
        image: diabetes-care-platform:latest
        ports:
        - containerPort: 1012
        env:
        - name: PORT
          value: "1012"
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-secrets
              key: gemini-api-key
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /status
            port: 1012
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /status
            port: 1012
          initialDelaySeconds: 15
          periodSeconds: 5
